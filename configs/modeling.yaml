modeling:
  random_state: 14
  holdout:
    test_size: 0.3
    random_state: 14
  cv:
    n_splits: 10
    shuffle: true
  best_model_filename: "best_model.joblib"
  comparison_filename: "model_comparison.csv"
  training_summary_filename: "training_summary.json"
  evaluation_filename: "evaluation_report.json"
  perceptron:
    enabled: true
    max_iter: 1000
  decision_tree:
    enabled: true
    n_iter: 20
    criterion_choices:
      - "gini"
      - "entropy"
    max_depth_low: 2
    max_depth_high: 30
    min_samples_leaf_low: 1
    min_samples_leaf_high: 50
    class_weight_choices:
      - null
      - "balanced"
  linear_svm:
    enabled: true
    max_iter: 5000
